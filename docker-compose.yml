version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dg-db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d 'dg-db'"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dg-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dg-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/dg-db
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: a_very_long_random_string_at_least_10_chars
      FRONTEND_URL: http://localhost:80
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-seed:
        condition: service_completed_successfully

  migrate-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dg-migrate-seed
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/dg-db
    command: sh -c "bun run db:migrate && bun run db:seed"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dg-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
